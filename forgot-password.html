<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#edf5ff" />
  <title>პაროლის აღდგენა — წიგნების თარო</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/books-shelf-logo.svg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card surface">
      <a class="auth-back" href="login.html">← პანელში შესვლაზე დაბრუნება</a>

      <div class="auth-brand">
        <div class="brand-mark">წთ</div>
        <div>
          <h1>პაროლის აღდგენა</h1>
          <p>ავტორისა და გამომცემლის ანგარიშისთვის</p>
        </div>
      </div>

      <p class="auth-note">
        შეიყვანე ის ელფოსტა, რომლითაც ავტორის ან გამომცემლის ანგარიში გაქვს შექმნილი.
        აღდგენის ბმული სწორედ ამ მისამართზე მოვა.
      </p>

      <form id="forgotPasswordForm" class="auth-form">
        <input
          id="forgotPasswordEmail"
          class="input"
          type="email"
          placeholder="ელფოსტა"
          autocomplete="email"
          required
        />
        <button class="primary-btn full" type="submit">აღდგენის წერილის გაგზავნა</button>
      </form>

      <div id="forgotPasswordMessage" class="form-message" aria-live="polite"></div>
      <p class="auth-switch">თუ წერილი ვერ მოგივიდა, გადაამოწმე spam საქაღალდე ან <a href="login.html">დაბრუნდი შესვლაზე</a>.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
