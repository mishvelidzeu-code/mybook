<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#edf5ff" />
  <title>ატვირთვა — ლურჯი თარო</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar surface compact">
      <a class="brand-wrap brand-link" href="index.html" aria-label="მთავარ გვერდზე დაბრუნება">
        <div class="brand-mark">ლთ</div>
        <div>
          <h1>ახალი გამოცემის ატვირთვა</h1>
          <p>ეს სივრცე განკუთვნილია მხოლოდ ავტორებისა და გამომცემლებისთვის</p>
        </div>
      </a>

      <div class="top-actions">
        <a class="ghost-btn" href="admin.html">პანელი</a>
        <a class="ghost-btn" href="library.html">ბიბლიოთეკა</a>
      </div>
    </header>

    <main class="content-stack">
      <section class="panel surface">
        <div class="section-head">
          <h2>ატვირთე ელწიგნი ან აუდიოწიგნი</h2>
          <span>ყდის რეკომენდებული პროპორციაა 1000 × 1500, რათა კატალოგში სიმეტრია დაცული იყოს</span>
        </div>

        <form id="uploadForm" class="stack-form">
          <input id="bookTitle" class="input" type="text" placeholder="წიგნის სათაური" required />
          <input id="bookAuthor" class="input" type="text" placeholder="ავტორი" required />
          <select id="bookType" class="input" required>
            <option value="">აირჩიე ტიპი</option>
            <option value="ebook">ელექტრონული წიგნი</option>
            <option value="audio">აუდიო წიგნი</option>
          </select>
          <select id="bookGenre" class="input" required>
            <option value="">აირჩიე ჟანრი</option>
            <option value="ბიზნესი">ბიზნესი</option>
            <option value="მოტივაცია">მოტივაცია</option>
            <option value="ფსიქოლოგია">ფსიქოლოგია</option>
            <option value="რომანი">რომანი</option>
            <option value="თვითგანვითარება">თვითგანვითარება</option>
          </select>
          <input id="bookDetails" class="input" type="text" placeholder="ფორმატი ან ხანგრძლივობა, მაგ: PDF / EPUB ან 5სთ 20წთ" required />
          <input id="bookPrice" class="input" type="number" min="0" step="0.01" placeholder="ფასი" required />
          <textarea id="bookDescription" class="input textarea" placeholder="მოკლე აღწერა" required></textarea>

          <label class="check-field">
            <input id="bookAdultsOnly" type="checkbox" />
            <span>მხოლოდ 18+ მკითხველისთვის</span>
          </label>

          <label class="upload-field">
            <span>ატვირთე ძირითადი ფაილი</span>
            <input id="ebookFile" type="file" accept=".pdf,.epub,.mobi,.mp3,.zip" required />
          </label>

          <label class="upload-field">
            <span>ატვირთე ყდა</span>
            <input id="coverFile" type="file" accept="image/*" required />
          </label>

          <button class="primary-btn full" type="submit">კატალოგში დამატება</button>
        </form>

        <div id="uploadMessage" class="form-message" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/upload.js"></script>
</body>
</html>
