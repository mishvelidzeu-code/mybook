<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#edf5ff" />
  <title>ახალი პაროლი — წიგნების თარო</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/books-shelf-logo.svg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card surface">
      <a class="auth-back" href="forgot-password.html">← აღდგენის გვერდზე დაბრუნება</a>

      <div class="auth-brand">
        <div class="brand-mark">წთ</div>
        <div>
          <h1>ახალი პაროლი</h1>
          <p>ელფოსტიდან დაბრუნების შემდეგ შეიყვანე ახალი პაროლი</p>
        </div>
      </div>

      <p class="auth-note">
        ეს გვერდი მუშაობს მაშინ, როცა პაროლის აღდგენის ბმულით შემოდიხარ.
        თუ ბმული უკვე გახსენი, უბრალოდ შეიყვანე ახალი პაროლი და დაადასტურე.
      </p>

      <form id="resetPasswordForm" class="auth-form">
        <input
          id="resetPassword"
          class="input"
          type="password"
          placeholder="ახალი პაროლი"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <input
          id="resetPasswordConfirm"
          class="input"
          type="password"
          placeholder="გაიმეორე ახალი პაროლი"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <button class="primary-btn full" type="submit">პაროლის განახლება</button>
      </form>

      <div id="resetPasswordMessage" class="form-message" aria-live="polite"></div>
      <p class="auth-switch">თუ ისევ გჭირდება ახალი წერილი, <a href="forgot-password.html">გააგზავნე თავიდან</a>.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
