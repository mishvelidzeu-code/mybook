<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#06070a" />
  <title>Checkout — NoirLeaf</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar glass compact">
      <div class="brand-wrap">
        <div class="brand-mark">N</div>
        <div>
          <h1>Checkout</h1>
          <p>Secure payment flow</p>
        </div>
      </div>
      <a class="ghost-btn" href="library.html">Library</a>
    </header>

    <main class="content-stack">
      <section class="glass panel checkout-box">
        <div class="section-head">
          <h2>გადახდა</h2>
          <span>Payment intent structure ready</span>
        </div>

        <div class="checkout-summary">
          <div>
            <strong id="checkoutBookName">Selected Book</strong>
            <p>Premium ebook purchase</p>
          </div>
          <strong id="checkoutBookPrice">₾0.00</strong>
        </div>

        <form id="paymentForm" class="stack-form">
          <input id="cardName" class="input" type="text" placeholder="Name on card" autocomplete="cc-name" required />
          <input
            id="cardNumber"
            class="input"
            type="text"
            inputmode="numeric"
            placeholder="Card number"
            autocomplete="cc-number"
            required
          />
          <div class="grid-2">
            <input
              id="cardExpiry"
              class="input"
              type="text"
              inputmode="numeric"
              placeholder="MM/YY"
              autocomplete="cc-exp"
              required
            />
            <input
              id="cardCvc"
              class="input"
              type="text"
              inputmode="numeric"
              placeholder="CVC"
              autocomplete="cc-csc"
              required
            />
          </div>
          <button class="primary-btn full" type="submit">გადახდა</button>
        </form>

        <div id="paymentMessage" class="form-message" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/payments.js"></script>
</body>
</html>
